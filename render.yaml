# render.yaml - Render 部署配置
# 放到项目根目录

services:
  - type: web
    name: ea-fc-live-dashboard
    env: docker
    region: oregon
    buildCommand: docker build -t ea-fc-live .
    startCommand: docker run -p 10000:8000 ea-fc-live
    envVars:
      - key: API_FOOTBALL_KEY
        sync: false
      - key: DEBUG
        value: "false"
    ports:
      - 10000
