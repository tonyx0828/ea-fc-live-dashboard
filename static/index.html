<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Live Sports Dashboard</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --accent: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-live: #ff4757;
            --accent-success: #2ed573;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --text-muted: #5a5a6e;
            --border-color: #2a2a3a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }
        
        .header-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            color: var(--text-secondary);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 25px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Sport Tabs */
        .sport-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .sport-tab {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .sport-tab:hover, .sport-tab.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }
        
        .sport-tab .count {
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 5px;
        }
        
        /* Stats */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        /* Matches */
        .matches-grid { display: grid; gap: 20px; }
        
        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
        }
        
        .match-card:hover {
            background: var(--bg-card-hover);
            transform: scale(1.01);
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .league-badge {
            padding: 5px 12px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(0, 212, 255, 0.2));
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 20px;
            color: var(--accent-live);
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .live-indicator .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-live);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        .teams-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        
        .team {
            flex: 1;
            text-align: center;
        }
        
        .team-logo {
            width: 60px;
            height: 60px;
            background: var(--bg-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.5rem;
        }
        
        .team-name {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .team-venue {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .score-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .score {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .score-value { min-width: 50px; text-align: center; }
        .score-divider { color: var(--text-muted); }
        
        .score-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        /* Loading/Error */
        .loading, .no-matches, .error {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); border-radius: 12px; color: var(--accent-live); }
        
        /* Refresh */
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
            transition: all 0.3s;
        }
        
        .refresh-btn:hover { transform: rotate(180deg); }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
        }
        
        @media (max-width: 768px) {
            .teams-container { flex-direction: column; }
            .score { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Live Sports Dashboard</h1>
            <div class="header-meta">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span id="connection-status">Loading...</span>
                </div>
                <span id="last-update">--</span>
            </div>
        </header>
        
        <!-- Sport Tabs -->
        <div class="sport-tabs" id="sport-tabs"></div>
        
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="match-count">-</div>
                <div class="stat-label">Live Matches</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-score">-</div>
                <div class="stat-label">Total Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sports-count">-</div>
                <div class="stat-label">Sports</div>
            </div>
        </div>
        
        <!-- Matches -->
        <div id="matches-container" class="matches-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading live matches...</p>
            </div>
        </div>
        
        <div class="footer">
            <p>Powered by FastAPI + WebSocket + Polars</p>
            <p>Data: API-Football | Deployed on Render</p>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="loadData()" title="Refresh">🔄</button>
    
    <script>
        const SPORTS = {
            all: { emoji: '🏆', name: 'All Sports' },
            football: { emoji: '⚽', name: 'Football' },
            nba: { emoji: '🏀', name: 'NBA' },
            nfl: { emoji: '🏈', name: 'NFL' },
            hockey: { emoji: '🏒', name: 'Hockey' }
        };
        
        let currentSport = 'all';
        
        async function loadData() {
            const statusEl = document.getElementById('connection-status');
            const container = document.getElementById('matches-container');
            
            statusEl.textContent = 'Loading...';
            
            try {
                const response = await fetch('/api/sports/live');
                const result = await response.json();
                
                // Render tabs
                renderTabs(result.sports || {});
                
                // Filter by current sport
                let matches = [];
                if (currentSport === 'all') {
                    // Get all matches from all sports
                    Object.values(result.sports || {}).forEach(sport => {
                        matches = matches.concat(sport.matches || []);
                    });
                } else if (result.sports && result.sports[currentSport]) {
                    matches = result.sports[currentSport].matches || [];
                }
                
                if (matches.length > 0) {
                    displayMatches(matches);
                    statusEl.textContent = '🟢 Live';
                } else {
                    container.innerHTML = `
                        <div class="no-matches">
                            <div style="font-size: 4rem; margin-bottom: 20px;">😴</div>
                            <p>No live matches right now</p>
                            <p style="font-size: 0.85rem; margin-top: 10px;">Check back later for live sports</p>
                        </div>
                    `;
                    document.getElementById('match-count').textContent = '0';
                }
                
                // Update stats
                document.getElementById('match-count').textContent = result.total_matches || 0;
                document.getElementById('sports-count').textContent = Object.keys(result.sports || {}).length;
                
            } catch (e) {
                console.error('Error:', e);
                container.innerHTML = `<div class="error">Error: ${e.message}</div>`;
                statusEl.textContent = '🔴 Error';
            }
            
            document.getElementById('last-update').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        }
        
        function renderTabs(sportsData) {
            const tabsEl = document.getElementById('sport-tabs');
            let tabs = `<button class="sport-tab ${currentSport === 'all' ? 'active' : ''}" onclick="switchSport('all')">
                🏆 All <span class="count">${Object.values(sportsData).reduce((a, s) => a + (s.count || 0), 0)}</span>
            </button>`;
            
            Object.entries(sportsData).forEach(([key, data]) => {
                tabs += `<button class="sport-tab ${currentSport === key ? 'active' : ''}" onclick="switchSport('${key}')">
                    ${data.emoji} ${data.name} <span class="count">${data.count || 0}</span>
                </button>`;
            });
            
            tabsEl.innerHTML = tabs;
        }
        
        function switchSport(sport) {
            currentSport = sport;
            loadData();
        }
        
        function displayMatches(matches) {
            const container = document.getElementById('matches-container');
            
            container.innerHTML = matches.map(match => {
                const isLive = !['FT', 'NS', 'POST'].includes(match.status);
                const statusText = match.time ? `${match.time}'` : match.status;
                
                // Get sport emoji
                const sportEmoji = match.sport === 'basketball' || match.sport === 'nba' ? '🏀' :
                                   match.sport === 'american-football' || match.sport === 'nfl' ? '🏈' :
                                   match.sport === 'hockey' ? '🏒' : '⚽';
                
                return `
                    <div class="match-card">
                        <div class="match-header">
                            <div>
                                <span class="league-badge">${sportEmoji} ${match.league?.name || 'Unknown'}</span>
                            </div>
                            <div class="live-indicator">
                                <span class="dot"></span>
                                LIVE ${statusText}
                            </div>
                        </div>
                        
                        <div class="teams-container">
                            <div class="team">
                                <div class="team-logo">${sportEmoji}</div>
                                <div class="team-name">${match.home_team?.name || 'TBD'}</div>
                                <div class="team-venue">📍 ${match.home_team?.venue || match.home_team?.city || 'Home'}</div>
                            </div>
                            
                            <div class="score-container">
                                <div class="score">
                                    <span class="score-value">${match.home_score || 0}</span>
                                    <span class="score-divider">-</span>
                                    <span class="score-value">${match.away_score || 0}</span>
                                </div>
                                <span class="score-label">${match.home_team?.venue || ''}</span>
                            </div>
                            
                            <div class="team">
                                <div class="team-logo">${sportEmoji}</div>
                                <div class="team-name">${match.away_team?.name || 'TBD'}</div>
                                <div class="team-venue">📍 ${match.away_team?.venue || match.away_team?.city || 'Away'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Auto-refresh
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setInterval(loadData, 30000);
        });
    </script>
</body>
</html>
