<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ EA FC Live Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0,255,0,0.2);
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }
        
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .match-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .match-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .league-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(124, 58, 237, 0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }
        
        .team {
            text-align: center;
            flex: 1;
        }
        
        .team-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .score {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            padding: 10px 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 0 15px;
        }
        
        .score.live {
            background: rgba(255,0,0,0.3);
            animation: livePulse 1s infinite;
        }
        
        @keyframes livePulse {
            0%, 100% { background: rgba(255,0,0,0.3); }
            50% { background: rgba(255,0,0,0.5); }
        }
        
        .match-time {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }
        
        .live-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #ff4444;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        
        .no-matches {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        
        .error {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.85rem;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #00d4ff);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
            transition: transform 0.3s;
        }
        
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ EA FC Live Dashboard</h1>
            <div class="status">
                <span class="status-dot"></span>
                <span id="connection-status">Connecting...</span>
            </div>
        </header>
        
        <div id="error-container"></div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="match-count">-</div>
                <div class="stat-label">Live Matches</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-goals">-</div>
                <div class="stat-label">Total Goals</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-possession">-</div>
                <div class="stat-label">Avg Possession %</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="last-update">-</div>
                <div class="stat-label">Last Update</div>
            </div>
        </div>
        
        <div id="matches-container" class="matches-grid">
            <div class="loading">Loading matches...</div>
        </div>
        
        <div class="footer">
            <p>Powered by FastAPI + WebSocket + Polars</p>
            <p>Data: API-Football</p>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="refreshData()" title="Refresh">🔄</button>
    
    <script>
        const API_BASE = window.location.origin;
        
        // 直接用 REST API (更稳定)
        async function loadData() {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Loading...';
            
            try {
                const response = await fetch(API_BASE + '/api/matches/live');
                const result = await response.json();
                
                if (result.matches && result.matches.length > 0) {
                    displayMatches(result.matches);
                    updateStats(result);
                    document.getElementById('connection-status').textContent = '🟢 Live';
                } else {
                    document.getElementById('matches-container').innerHTML = '<div class="no-matches">No matches</div>';
                    document.getElementById('match-count').textContent = '0';
                }
            } catch (e) {
                console.error('Error:', e);
                showError('Failed to load data');
                statusEl.textContent = '🔴 Error';
            }
        }
        
        // 处理 WebSocket 消息
        function handleMessage(data) {
            if (data.type === 'live_matches_v2' && data.matches) {
                displayMatches(data.matches);
                updateStats(data.stats);
                updateTimestamp();
            } else if (data.type === 'no_matches') {
                document.getElementById('matches-container').innerHTML = 
                    '<div class="no-matches">😴 No live matches right now</div>';
                document.getElementById('match-count').textContent = '0';
            } else if (data.type === 'error') {
                showError(data.message);
            }
        }
        
        // 显示比赛
        function displayMatches(matches) {
            const container = document.getElementById('matches-container');
            
            if (!matches || matches.length === 0) {
                container.innerHTML = '<div class="no-matches">😴 No live matches right now</div>';
                return;
            }
            
            container.innerHTML = matches.map(match => `
                <div class="match-card">
                    <div class="league-badge">${match.league_name || 'Unknown League'}</div>
                    <div class="teams">
                        <div class="team">
                            <div style="font-size: 2rem;">🏠</div>
                            <div class="team-name">${match.home_team}</div>
                        </div>
                        <div class="score ${isLive(match.status) ? 'live' : ''}">
                            ${match.home_score} - ${match.away_score}
                        </div>
                        <div class="team">
                            <div style="font-size: 2rem;">✈️</div>
                            <div class="team-name">${match.away_team}</div>
                        </div>
                    </div>
                    <div class="match-time">
                        ${isLive(match.status) ? '<span class="live-badge">LIVE</span> ' : ''}
                        ${match.status} • ${formatTime(match.date)}
                    </div>
                </div>
            `).join('');
        }
        
        // 更新统计
        function updateStats(result) {
            if (!result || !result.matches) return;
            
            const matches = result.matches;
            document.getElementById('match-count').textContent = matches.length;
            
            // 计算总进球
            let totalGoals = 0;
            matches.forEach(m => {
                totalGoals += (m.home_score || 0) + (m.away_score || 0);
            });
            document.getElementById('total-goals').textContent = totalGoals;
            document.getElementById('avg-possession').textContent = '50%';
            
            updateTimestamp();
        }
        
        // 更新时间
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-update').textContent = 
                now.toLocaleTimeString();
        }
        
        // 手动刷新
        function refreshData() {
            loadViaREST();
        }
        
        // 辅助函数
        function isLive(status) {
            return ['1H', '2H', 'HT', 'ET', 'BT', 'P'].includes(status);
        }
        
        function formatTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        function showError(msg) {
            document.getElementById('error-container').innerHTML = 
                `<div class="error">${msg}</div>`;
        }
        
        // 启动
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            // 自动刷新每30秒
            setInterval(loadData, 30000);
        });
    </script>
</body>
</html>
