<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Live Sports Dashboard</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --accent: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-live: #ff4757;
            --accent-success: #2ed573;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --text-muted: #5a5a6e;
            --border-color: #2a2a3a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header { text-align: center; padding: 40px 20px; }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }
        
        .header-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            color: var(--text-secondary);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 25px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Sport Tabs */
        .sport-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .sport-tab {
            padding: 12px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sport-tab:hover { background: var(--bg-card-hover); }
        
        .sport-tab.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: white;
            border-color: transparent;
            transform: scale(1.05);
        }
        
        .sport-tab .count {
            background: rgba(0,0,0,0.3);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        
        /* Stats */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        
        /* Matches */
        .matches-grid { display: grid; gap: 20px; }
        
        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .match-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.15);
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .league-badge {
            padding: 6px 14px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(0, 212, 255, 0.2));
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 20px;
            color: var(--accent-live);
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .live-indicator .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-live);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        .teams-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        
        .team { flex: 1; text-align: center; }
        
        .team-logo {
            width: 70px;
            height: 70px;
            background: var(--bg-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 2rem;
        }
        
        .team-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; }
        .team-venue { font-size: 0.75rem; color: var(--text-muted); }
        
        .score-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        
        .score { display: flex; align-items: center; gap: 20px; font-size: 2.5rem; font-weight: 700; }
        .score-value { min-width: 60px; text-align: center; }
        .score-divider { color: var(--text-muted); }
        .score-label { font-size: 0.7rem; color: var(--text-muted); text-align: center; }
        
        /* Loading/Error */
        .loading, .no-matches, .error {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); border-radius: 12px; color: var(--accent-live); }
        
        /* Refresh */
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
            transition: all 0.3s;
        }
        
        .refresh-btn:hover { transform: rotate(180deg) scale(1.1); }
        .refresh-btn.refreshing { animation: spin 1s linear infinite; }
        
        /* Match Detail Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--bg-card);
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .ws-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 15px;
        }
        
        .ws-status.disconnected { background: rgba(255, 0, 0, 0.1); }
        
        .chat-container {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 15px;
        }
        
        .chat-message {
            padding: 8px 12px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border-radius: 8px;
            font-size: 0.85rem;
        }
        
        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
        }
        
        .chat-input button {
            padding: 12px 20px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
        }
        
        @media (max-width: 768px) {
            .teams-container { flex-direction: column; }
            .score { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Live Sports Dashboard</h1>
            <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 5px;">
                v2026.03.01.1051 | Build: <span id="build-time"></span>
            </div>
            <div class="header-meta">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span id="connection-status">Loading...</span>
                </div>
                <span id="last-update">--</span>
            </div>
        </header>
        
        <!-- Sport Tabs -->
        <div class="sport-tabs" id="sport-tabs"></div>
        
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="match-count">-</div>
                <div class="stat-label">Live Matches</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sports-count">-</div>
                <div class="stat-label">Sports</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-score">-</div>
                <div class="stat-label">Avg Score</div>
            </div>
        </div>
        
        <!-- Matches -->
        <div id="matches-container" class="matches-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading live matches...</p>
            </div>
        </div>
        
        <div class="footer">
            <p>Powered by FastAPI + WebSocket + Polars</p>
            <p>Data: API-Football | Deployed on Render</p>
        </div>
    </div>
    
    <!-- Match Detail Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>
    
    <script>
        // Sport emoji mapping - FIXED
        const SPORT_EMOJI = {
            football: '⚽',
            basketball: '🏀',
            nba: '🏀',
            'american-football': '🏈',
            nfl: '🏈',
            afl: '🏉',
            hockey: '🏒',
            baseball: '⚾',
            handball: '🤾',
            formula1: '🏎️',
            mma: '🥊',
            rugby: '🏉',
            volleyball: '🏐'
        };
        
        // League name to sport mapping
        const LEAGUE_TO_SPORT = {
            'nba': '🏀',
            'ncaa': '🏀',
            'ncaa women': '🏀',
            'euroleague': '🏀',
            'wnba': '🏀',
            'premier league': '⚽',
            'la liga': '⚽',
            'bundesliga': '⚽',
            'serie a': '⚽',
            'ligue 1': '⚽',
            'champions league': '⚽',
            'world cup': '🏆',
            'nfl': '🏈',
            'nhl': '🏒',
            'mlb': '⚾'
        };
        
        function getSportEmojiFromLeague(leagueName) {
            if (!leagueName) return '🏀';
            const lower = leagueName.toLowerCase();
            for (const [key, emoji] of Object.entries(LEAGUE_TO_SPORT)) {
                if (lower.includes(key)) return emoji;
            }
            return '🏀'; // Default to basketball
        }
        
        // Global cache
        let allData = null;
        let currentSport = 'all';
        let ws = null;
        let wsTimeout = null;
        
        // Get sport emoji
        function getSportEmoji(sport) {
            return SPORT_EMOJI[sport] || '⚽';
        }
        
        // Load all data once
        async function loadAllData() {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Loading...';
            
            try {
                const response = await fetch('/api/sports/live');
                const result = await response.json();
                
                // Cache all data
                allData = result;
                
                // Render tabs
                renderTabs();
                
                // Check if there's a message (no data)
                if (result.sports && result.sports.message) {
                    document.getElementById('matches-container').innerHTML = `
                        <div class="no-matches">
                            <div style="font-size: 4rem;">${result.sports.message.emoji || '😴'}</div>
                            <p>${result.sports.message.note || 'No matches right now'}</p>
                        </div>
                    `;
                    document.getElementById('match-count').textContent = '0';
                    statusEl.textContent = '⚪ No matches';
                    return;
                }
                
                // Display matches (filtered on client side)
                displayMatches();
                
                statusEl.textContent = '🟢 Live';
                
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('matches-container').innerHTML = 
                    `<div class="error">Error: ${e.message}</div>`;
                statusEl.textContent = '🔴 Error';
            }
            
            document.getElementById('last-update').textContent = 
                'Updated: ' + new Date().toLocaleTimeString();
        }
        
        // Render sport tabs
        function renderTabs() {
            if (!allData || !allData.sports) return;
            
            const tabsEl = document.getElementById('sport-tabs');
            const sports = allData.sports;
            
            // Calculate total matches
            let totalMatches = 0;
            Object.values(sports).forEach(s => {
                if (s.count) totalMatches += s.count;
            });
            
            let tabs = `<button class="sport-tab ${currentSport === 'all' ? 'active' : ''}" 
                onclick="switchSport('all')">
                🏆 All <span class="count">${totalMatches}</span>
            </button>`;
            
            Object.entries(sports).forEach(([key, data]) => {
                if (data.count > 0) {
                    // Use basketball emoji for basketball tab
                    const emoji = key === 'basketball' ? '🏀' : getSportEmoji(key);
                    tabs += `<button class="sport-tab ${currentSport === key ? 'active' : ''}" 
                        onclick="switchSport('${key}')">
                        ${emoji} ${data.name} <span class="count">${data.count}</span>
                    </button>`;
                }
            });
            
            tabsEl.innerHTML = tabs;
        }
        
        // Switch sport (client-side filter, no API call)
        function switchSport(sport) {
            currentSport = sport;
            
            // Update tab UI
            document.querySelectorAll('.sport-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.closest('.sport-tab')?.classList.add('active');
            
            // Filter on client side
            displayMatches();
        }
        
        // Display matches (filtered)
        function displayMatches() {
            const container = document.getElementById('matches-container');
            
            if (!allData || !allData.sports) {
                container.innerHTML = '<div class="no-matches">No data available</div>';
                return;
            }
            
            // Collect matches based on current filter
            let matches = [];
            
            if (currentSport === 'all') {
                Object.values(allData.sports).forEach(sport => {
                    if (sport.matches) {
                        matches = matches.concat(sport.matches);
                    }
                });
            } else if (allData.sports[currentSport]) {
                matches = allData.sports[currentSport].matches || [];
            }
            
            if (matches.length === 0) {
                container.innerHTML = `
                    <div class="no-matches">
                        <div style="font-size: 4rem; margin-bottom: 20px;">😴</div>
                        <p>No live matches right now</p>
                        <p style="font-size: 0.85rem; margin-top: 10px;">Check back later for live sports</p>
                    </div>
                `;
                document.getElementById('match-count').textContent = '0';
                return;
            }
            
            // Update stats
            document.getElementById('match-count').textContent = matches.length;
            
            const sportsCount = Object.values(allData.sports).filter(s => s.count > 0).length;
            document.getElementById('sports-count').textContent = sportsCount;
            
            // Calculate avg score - FIX: Handle API response format
            let totalScore = 0;
            matches.forEach(m => {
                const home = m.scores?.home?.total ?? m.home_score ?? 0;
                const away = m.scores?.away?.total ?? m.away_score ?? 0;
                totalScore += home + away;
            });
            document.getElementById('avg-score').textContent = 
                matches.length ? (totalScore / matches.length).toFixed(1) : '0';
            
            // Render matches
            container.innerHTML = matches.map((match, idx) => {
                // FIX: Handle API response format (teams.home.name, scores.home.total)
                const homeTeam = match.teams?.home || match.home_team || {};
                const awayTeam = match.teams?.away || match.away_team || {};
                
                // Determine status FIRST (before using it)
                const status = match.status?.short || match.status || 'NS';
                
                // Only show score if game has started (not NS, not future)
                const rawHomeScore = match.scores?.home?.total ?? match.home_score ?? null;
                const rawAwayScore = match.scores?.away?.total ?? match.away_score ?? null;
                // Only show score if it's not null and game is not upcoming
                const showScore = (rawHomeScore !== null && rawAwayScore !== null) && (status !== 'NS' && status !== 'TBD');
                const homeScore = showScore ? rawHomeScore : '-';
                const awayScore = showScore ? rawAwayScore : '-';
                const leagueName = match.league?.name || 'Match';
                // Only these are actually live games
                const isLive = ['1H', '2H', 'Q1', 'Q2', 'Q3', 'Q4', 'P1', 'P2', 'P3', 'HT', 'ET'].includes(status);
                
                // Get start time
                let timeDisplay = '';
                if (isLive) {
                    timeDisplay = `LIVE ${match.time || status}`;
                } else if (match.date) {
                    const matchDate = new Date(match.date);
                    timeDisplay = matchDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                } else if (match.time) {
                    timeDisplay = match.time;
                }
                
                // Use league-based emoji (more accurate)
                const emoji = getSportEmojiFromLeague(leagueName);
                
                // Determine display status - always show start time
                let statusDisplay = '';
                // Parse the ISO date string properly (contains timezone offset)
                const matchDate = match.date ? new Date(match.date) : null;
                
                // Format start time in local timezone - use explicit parsing
                let startTimeStr = '';
                if (match.date) {
                    // Parse ISO string: 2026-03-01T20:30:00+00:00
                    const [datePart, timePart] = match.date.split('T');
                    const [year, month, day] = datePart.split('-').map(Number);
                    const [time, timezone] = timePart.split('+');
                    const [hours, minutes] = time.split(':').map(Number);
                    
                    // Create date in local timezone
                    const localDate = new Date(year, month - 1, day, hours, minutes);
                    
                    // Format to local timezone
                    const localTimeStr = localDate.toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: true});
                    const localDateStr = localDate.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
                    startTimeStr = `${localDateStr} ${localTimeStr}`;
                }
                
                if (isLive || status in ['Q1', 'Q2', 'Q3', 'Q4', 'HT', 'P1', 'P2', 'P3']) {
                    // For live games, show current quarter + start time
                    const gameTime = match.status?.timer || match.status?.long || '';
                    statusDisplay = `<div class="live-indicator"><span class="dot"></span>${gameTime || 'LIVE'}</div>
                        <div class="match-time" style="font-size: 0.75rem; color: var(--text-muted);">Started: ${startTimeStr}</div>`;
                } else if (status === 'FT') {
                    statusDisplay = `<div class="match-time" style="color: var(--text-secondary);">Final</div>
                        <div class="match-time" style="font-size: 0.75rem; color: var(--text-muted);">${startTimeStr}</div>`;
                } else {
                    // Upcoming games - show start time prominently
                    statusDisplay = `<div class="match-time" style="color: var(--accent);">📅 ${startTimeStr || 'TBD'}</div>`;
                }
                
                return `
                    <div class="match-card" onclick="openMatchDetail('${match.sport || 'basketball'}', ${match.id})">
                        <div class="match-header">
                            <span class="league-badge">${emoji} ${leagueName}</span>
                            ${statusDisplay}
                        </div>
                        
                        <div class="teams-container">
                            <div class="team">
                                <div class="team-logo">${emoji}</div>
                                <div class="team-name">${homeTeam.name || 'TBD'}</div>
                                <div class="team-venue">📍 ${match.venue || 'Home'}</div>
                            </div>
                            
                            <div class="score-container">
                                <div class="score">
                                    <span class="score-value">${homeScore}</span>
                                    <span class="score-divider">-</span>
                                    <span class="score-value">${awayScore}</span>
                                </div>
                            </div>
                            
                            <div class="team">
                                <div class="team-logo">${emoji}</div>
                                <div class="team-name">${awayTeam.name || 'TBD'}</div>
                                <div class="team-venue">📍 ${match.venue || 'Away'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Match Detail with WebSocket
        function openMatchDetail(sport, matchId) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            
            // Find match data
            let match = null;
            if (allData?.sports?.[sport]?.matches) {
                match = allData.sports[sport].matches.find(m => (m.fixture?.id || m.id) === matchId);
            }
            
            // FIX: Handle API response format for match detail
            const homeTeam = match?.teams?.home || match?.home_team || { name: 'Team A' };
            const awayTeam = match?.teams?.away || match?.away_team || { name: 'Team B' };
            const homeScore = match?.scores?.home?.total ?? match?.home_score ?? 0;
            const awayScore = match?.scores?.away?.total ?? match?.away_score ?? 0;
            
            if (!match) {
                match = { 
                    teams: { home: { name: 'Team A' }, away: { name: 'Team B' } },
                    scores: { home: { total: 0 }, away: { total: 0 } },
                    status: { short: 'LIVE' },
                    time: 45
                };
            }
            
            const emoji = getSportEmoji(sport);
            
            content.innerHTML = `
                <button class="refresh-btn" style="position:absolute;top:15px;right:60px;width:40px;height:40px;font-size:1rem;" onclick="loadData();openMatchDetail('${sport}', ${matchId})">🔄</button>
                <h2 style="margin-bottom: 20px;">${emoji} ${match.league?.name || 'Match'}</h2>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <div style="text-align: center; flex: 1;">
                        <div style="font-size: 3rem; margin-bottom: 10px;">${emoji}</div>
                        <div style="font-weight: 600;">${homeTeam.name || 'Home'}</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 2.5rem; font-weight: 700;">
                            ${homeScore} - ${awayScore}
                        </div>
                        <div style="color: var(--accent-live);">${match.time || match.status?.short || match.status}</div>
                    </div>
                    <div style="text-align: center; flex: 1;">
                        <div style="font-size: 3rem; margin-bottom: 10px;">${emoji}</div>
                        <div style="font-weight: 600;">${awayTeam.name || 'Away'}</div>
                    </div>
                </div>
                
                <div class="ws-status" id="ws-status">
                    <span class="status-dot"></span>
                    <span>Connecting to live chat...</span>
                </div>
                
                <div class="chat-container" id="chat-container">
                    <div class="chat-message">🏟️ Welcome to live match chat!</div>
                </div>
                
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Say something..." 
                        onkeypress="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()">Send</button>
                </div>
            `;
            
            modal.classList.add('active');
            
            // Connect WebSocket for this match
            connectMatchWebSocket(sport, matchId);
        }
        
        // WebSocket connection
        function connectMatchWebSocket(sport, matchId) {
            disconnectWebSocket();
            
            const wsStatus = document.getElementById('ws-status');
            
            try {
                ws = new WebSocket(`wss://ea-fc-live-dashboard.onrender.com/ws/match/${matchId}`);
                
                ws.onopen = () => {
                    wsStatus.innerHTML = '<span class="status-dot"></span><span>🟢 Live chat connected</span>';
                    wsStatus.classList.remove('disconnected');
                };
                
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === 'chat') {
                        addChatMessage(data.message);
                    } else if (data.type === 'score_update') {
                        // Update score
                        console.log('Score update:', data);
                    }
                };
                
                ws.onclose = () => {
                    wsStatus.innerHTML = '<span>🔴 Disconnected</span>';
                    wsStatus.classList.add('disconnected');
                };
                
                ws.onerror = () => {
                    wsStatus.innerHTML = '<span>⚠️ Connection error</span>';
                    wsStatus.classList.add('disconnected');
                };
                
                // Set inactivity timeout (30 seconds)
                resetInactivityTimer();
                
            } catch (e) {
                wsStatus.innerHTML = '<span>⚠️ WebSocket not available</span>';
                wsStatus.classList.add('disconnected');
            }
        }
        
        // Disconnect WebSocket
        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                ws = null;
            }
            if (wsTimeout) {
                clearTimeout(wsTimeout);
                wsTimeout = null;
            }
        }
        
        // Reset inactivity timer
        function resetInactivityTimer() {
            if (wsTimeout) clearTimeout(wsTimeout);
            wsTimeout = setTimeout(() => {
                disconnectWebSocket();
            }, 30000); // 30 seconds
        }
        
        // Add chat message
        function addChatMessage(msg) {
            const container = document.getElementById('chat-container');
            container.innerHTML += `<div class="chat-message">${msg}</div>`;
            container.scrollTop = container.scrollHeight;
        }
        
        // Send chat
        function sendChat() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'chat', message }));
                input.value = '';
                resetInactivityTimer();
            }
        }
        
        // Close modal
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            disconnectWebSocket();
        }
        
        // Refresh all data
        function refreshAll() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('refreshing');
            
            loadAllData().finally(() => btn.classList.remove('refreshing'));
        }
        
        // Activity listeners to reset timer
        document.addEventListener('mousemove', resetInactivityTimer);
        document.addEventListener('keypress', resetInactivityTimer);
        
        // Init
        document.addEventListener('DOMContentLoaded', () => {
            // Set build timestamp
            document.getElementById('build-time').textContent = new Date().toISOString();
            loadAllData();
        });
    </script>
</body>
</html>
