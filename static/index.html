<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ EA FC Live - Real-Time Football Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-live: #ff4757;
            --accent-success: #2ed573;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --text-muted: #5a5a6e;
            --border-color: #2a2a3a;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* Background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(255,255,255,0.01) 50px, rgba(255,255,255,0.01) 51px);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }
        
        .header-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 25px;
            font-size: 0.85rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Match Card */
        .matches-grid {
            display: grid;
            gap: 20px;
        }
        
        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
        }
        
        .match-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(0, 212, 255, 0.3);
            transform: scale(1.01);
        }
        
        /* League Header */
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .league-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .league-badge {
            padding: 5px 12px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(0, 212, 255, 0.2));
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .country-badge {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .match-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 20px;
            color: var(--accent-live);
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .live-indicator .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-live);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        .match-time {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        /* Teams */
        .teams-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        
        .team {
            flex: 1;
            text-align: center;
        }
        
        .team-logo {
            width: 60px;
            height: 60px;
            background: var(--bg-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.5rem;
        }
        
        .team-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .team-venue {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Score */
        .score-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .score {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .score-value {
            min-width: 50px;
            text-align: center;
        }
        
        .score-divider {
            color: var(--text-muted);
        }
        
        .score.halftime .score-divider::before {
            content: '(';
        }
        
        .score.halftime .score-divider::after {
            content: ')';
        }
        
        .score-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error */
        .error {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            color: var(--accent-live);
        }
        
        /* No matches */
        .no-matches {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .no-matches-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        /* Refresh button */
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .refresh-btn:hover {
            transform: rotate(180deg) scale(1.1);
        }
        
        .refresh-btn.refreshing {
            animation: spin 1s linear infinite;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .teams-container {
                flex-direction: column;
                gap: 20px;
            }
            
            .score {
                font-size: 2rem;
            }
            
            .match-header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">⚽</div>
            <h1>EA FC Live Dashboard</h1>
            <div class="header-meta">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span id="connection-status">Connecting...</span>
                </div>
                <span id="last-update">Last updated: --</span>
            </div>
        </header>
        
        <div id="error-container"></div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="match-count">-</div>
                <div class="stat-label">Live Matches</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-goals">-</div>
                <div class="stat-label">Total Goals</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="leagues-count">-</div>
                <div class="stat-label">Leagues</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-goals">-</div>
                <div class="stat-label">Avg Goals/Match</div>
            </div>
        </div>
        
        <div id="matches-container" class="matches-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading live matches...</p>
            </div>
        </div>
        
        <div class="footer">
            <p>Powered by FastAPI + WebSocket + Polars</p>
            <p>Data: API-Football | Deployed on Render</p>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="refreshData()" title="Refresh">🔄</button>
    
    <script>
        // Team emoji mapping
        const teamEmojis = {
            'Manchester United': '🔴',
            'Liverpool': '🔴',
            'Arsenal': '🔴',
            'Chelsea': '🔵',
            'Manchester City': '🔵',
            'Tottenham Hotspur': '⚪',
            'Barcelona': '🔵🔴',
            'Real Madrid': '⚪',
            'Atletico Madrid': '🔴',
            'Bayern Munich': '🔴',
            'Borussia Dortmund': '🟡',
            'Juventus': '⚫⚪',
            'AC Milan': '🔴⚫',
            'Inter Milan': '🔵⚫',
            'Paris Saint-Germain': '🔵',
            'Marseille': '🔵⚪'
        };
        
        function getTeamEmoji(teamName) {
            return teamEmojis[teamName] || '⚽';
        }
        
        async function loadData() {
            const statusEl = document.getElementById('connection-status');
            const container = document.getElementById('matches-container');
            const refreshBtn = document.querySelector('.refresh-btn');
            
            statusEl.textContent = 'Loading...';
            refreshBtn.classList.add('refreshing');
            
            try {
                const response = await fetch('/api/matches/live');
                const result = await response.json();
                
                if (result.matches && result.matches.length > 0) {
                    displayMatches(result.matches);
                    updateStats(result);
                    statusEl.textContent = '🟢 Live';
                } else {
                    container.innerHTML = `
                        <div class="no-matches">
                            <div class="no-matches-icon">😴</div>
                            <p>No live matches right now</p>
                            <p style="font-size: 0.85rem; margin-top: 10px;">Check back later for live football</p>
                        </div>
                    `;
                    document.getElementById('match-count').textContent = '0';
                    statusEl.textContent = '⚪ No matches';
                }
            } catch (e) {
                console.error('Error:', e);
                container.innerHTML = `<div class="error">Error: ${e.message}</div>`;
                statusEl.textContent = '🔴 Error';
            }
            
            refreshBtn.classList.remove('refreshing');
            document.getElementById('last-update').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
        }
        
        function displayMatches(matches) {
            const container = document.getElementById('matches-container');
            
            container.innerHTML = matches.map(match => {
                const isLive = ['1H', '2H', 'ET'].includes(match.status);
                const statusText = match.elapsed ? `${match.elapsed}'` : match.status_long;
                
                return `
                    <div class="match-card">
                        <div class="match-header">
                            <div class="league-info">
                                <span class="league-badge">${match.league_name}</span>
                                <span class="country-badge">${match.league_country}</span>
                            </div>
                            <div class="match-status">
                                ${isLive ? `
                                    <div class="live-indicator">
                                        <span class="dot"></span>
                                        LIVE ${match.elapsed}'
                                    </div>
                                ` : `
                                    <span class="match-time">${match.status_long}</span>
                                `}
                            </div>
                        </div>
                        
                        <div class="teams-container">
                            <div class="team">
                                <div class="team-logo">${getTeamEmoji(match.home_team)}</div>
                                <div class="team-name">${match.home_team}</div>
                                <div class="team-venue">📍 ${match.home_stadium || match.venue || 'Home'}</div>
                            </div>
                            
                            <div class="score-container">
                                <div class="score">
                                    <span class="score-value">${match.home_score}</span>
                                    <span class="score-divider">-</span>
                                    <span class="score-value">${match.away_score}</span>
                                </div>
                                <span class="score-label">${match.venue ? match.venue + ', ' + match.venue_city : ''}</span>
                            </div>
                            
                            <div class="team">
                                <div class="team-logo">${getTeamEmoji(match.away_team)}</div>
                                <div class="team-name">${match.away_team}</div>
                                <div class="team-venue">📍 ${match.away_stadium || 'Away'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function updateStats(result) {
            const matches = result.matches;
            
            // Match count
            document.getElementById('match-count').textContent = matches.length;
            
            // Total goals
            let totalGoals = 0;
            matches.forEach(m => {
                totalGoals += (m.home_score || 0) + (m.away_score || 0);
            });
            document.getElementById('total-goals').textContent = totalGoals;
            
            // Unique leagues
            const leagues = [...new Set(matches.map(m => m.league_name))];
            document.getElementById('leagues-count').textContent = leagues.length;
            
            // Average goals
            const avgGoals = matches.length > 0 ? (totalGoals / matches.length).toFixed(1) : 0;
            document.getElementById('avg-goals').textContent = avgGoals;
        }
        
        function refreshData() {
            loadData();
        }
        
        // Auto-refresh every 30 seconds
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setInterval(loadData, 30000);
        });
    </script>
</body>
</html>
